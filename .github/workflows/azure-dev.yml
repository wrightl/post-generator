name: Azure Deployment

# Run when commits are pushed to main
on:
  workflow_dispatch:
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - main

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read


jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AZURE_MIN_REPLICAS: ${{ vars.MIN_REPLICAS }}
      AZURE_EXISTING_OPENAI_NAME: ${{ vars.EXISTING_OPENAI_NAME }}
      AZURE_EXISTING_OPENAI_RESOURCE_GROUP: ${{ vars.EXISTING_OPENAI_RESOURCE_GROUP }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_ENV_NAME: postgenerator-${{ vars.AZURE_ENV_NAME }}
      CERTIFICATE_NAME_API: ${{ vars.CERTIFICATE_NAME_API }}
      CUSTOMDOMAIN_API: ${{ vars.CUSTOMDOMAIN_API }}
      CERTIFICATE_NAME_APP: ${{ vars.CERTIFICATE_NAME_APP }}
      CUSTOMDOMAIN_APP: ${{ vars.CUSTOMDOMAIN_APP }}
      AZURE_POSTGENERATOR_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
      AZURE_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      AZURE_FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIAL_JSON_BASE64 }}
      AZURE_MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
      AZURE_MAILGUN_DOMAIN: ${{ vars.MAILGUN_DOMAIN }}
      AZURE_MAILGUN_FROM_ADDRESS: ${{ vars.MAILGUN_FROM_ADDRESS }}
      AZURE_MAILGUN_FROM_NAME: ${{ vars.MAILGUN_FROM_NAME }}
      CHAT_MODEL_NAME: ${{ vars.CHAT_MODEL_NAME }}
      CHAT_MODEL_VERSION: ${{ vars.CHAT_MODEL_VERSION }}
      AZURE_AI_PROVIDER: ${{ vars.AI_PROVIDER }}
      AZURE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
        shell: bash

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Azure CLI login (for resource provider registration)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Register Azure Resource Providers
        run: |
          az provider register --namespace Microsoft.ContainerInstance --wait
          az provider register --namespace Microsoft.Storage --wait
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
        shell: bash

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt
        
