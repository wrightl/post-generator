name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6.0.2
      
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 'latest'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json
          
      - run: npm ci
      
      - run: npm run build
